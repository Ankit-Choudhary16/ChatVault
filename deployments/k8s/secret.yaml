# Create this secret before deploying:
# kubectl create secret generic chatvault-secrets -n chatvault \
#   --from-literal=postgres-user=ankit \
#   --from-literal=postgres-password=YOUR_SECURE_PASSWORD \
#   --from-literal=private-key=YOUR_JWT_SECRET_KEY
#
# Or apply this file after encoding values (base64):
# echo -n "ankit" | base64
# echo -n "your_password" | base64
# echo -n "your_jwt_secret" | base64
---
apiVersion: v1
kind: Secret
metadata:
  name: chatvault-secrets
  namespace: chatvault
  labels:
    app: chatvault
type: Opaque
stringData:
  postgres-user: ankit
  postgres-password: "1234"
  private-key: "5f1fe7e915314bad462f0ab0d24dd1adbb6c6fa958a948fab68228c0927acd8f"
  database-url: "postgres://ankit:1234@postgres:5432/chatvault?sslmode=disable"
# For production, use 'data' with base64-encoded values instead of stringData
